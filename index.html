<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Videy</title>

<style>
body{
margin:0;
background:#fff;
font-family:Arial;
text-align:center;
}

video{
width:100%;
max-width:900px;
margin-top:20px;
background:#000;
}

.download-btn{
display:inline-block;
margin:20px;
padding:12px 25px;
background:#6a5cff;
color:#fff;
text-decoration:none;
border-radius:30px;
font-weight:bold;
}
</style>
</head>

<body>

<video id="v" controls autoplay muted playsinline></video>

<br>

<a id="dl" class="download-btn" href="#" target="_blank">
DOWNLOAD
</a>

<script>
const path = window.location.pathname;

const id = path.split("/").pop().replace(".mp4","");

const video = "https://cdn.videiyy.cc/" + id + ".mp4";

document.getElementById("v").src = video;

document.getElementById("dl").href = video;
</script>

</body>
</html>
