<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Video Player</title>

<style>
body{
margin:0;
background:#000;
font-family:Arial;
text-align:center;
}

video{
width:100%;
height:100vh;
background:#000;
}

.download-btn{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
padding:12px 25px;
background:#6a5cff;
color:#fff;
text-decoration:none;
border-radius:30px;
font-weight:bold;
}
</style>
</head>

<body>

<video id="v" controls autoplay playsinline></video>

<a id="dl" class="download-btn" href="#" target="_blank">
DOWNLOAD
</a>

<script>
const p = new URLSearchParams(location.search);

const id = p.get("id");

const video = "https://cdn.videiyy.cc/" + id + ".mp4";

document.getElementById("v").src = video;

document.getElementById("dl").href = video;
</script>

</body>
</html>
